spring.application.name=photodiary

# ✅ H2 DB 설정 (파일 모드로 변경: /app/data 폴더 안에 데이터 저장)
spring.datasource.url=jdbc:h2:file:/app/data/photodiary;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA 관련 설정
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ✅ ddl-auto 수정: 'create'는 시작할 때마다 DB를 밀어버립니다.
# 데이터 유지를 위해 'update'로 반드시 변경해야 합니다.
spring.jpa.hibernate.ddl-auto=update

# ✅ 초기 데이터 설정: 파일 모드에서는 매번 실행할 필요가 없으므로 상황에 따라 조절하세요.
# 만약 초기 데이터(data.sql)를 매번 넣고 싶다면 아래 설정을 유지하되,
# 데이터가 중복될 수 있으므로 주의가 필요합니다.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# 파일 업로드 용량 제한
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 이미지가 저장될 실제 경로
file.upload-dir=/app/uploads/