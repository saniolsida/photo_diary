spring.application.name=photodiary
# H2 DB 설정 (메모리 모드: 재시작 시 데이터 초기화 / 파일 모드: 데이터 유지)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA 관련 설정
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# ddl-auto: update(기존 테이블 유지하며 수정), create(시작 시 매번 새로 만듦)
# 1. Hibernate가 엔티티를 보고 테이블을 먼저 만들게 함
spring.jpa.hibernate.ddl-auto=create
# 2. 테이블이 다 만들어진 '후'에 data.sql을 실행함 (핵심!)
spring.jpa.defer-datasource-initialization=true
# 3. SQL 스크립트 실행 모드 활성화
spring.sql.init.mode=always